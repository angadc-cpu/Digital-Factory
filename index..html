<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Twin Dashboard</title>
<style>
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    min-height:100vh;
    background:#000;
    color:#e5e5e5;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  }
  .page{
    max-width:1400px;
    margin:0 auto;
    padding:2rem 2rem 3rem;
  }
  .stat-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-bottom:1.25rem;
  }
  .stat-card{
    background:#141414;
    border:0.5px solid #262626;
    border-radius:10px;
    padding:1.1rem 1.25rem;
  }
  .stat-card p.label{
    font-size:13px;
    color:#9a9a9a;
    margin:0 0 6px;
  }
  .stat-card p.value{
    font-size:26px;
    font-weight:600;
    margin:0;
    color:#f5f5f5;
  }
  .machine-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-bottom:1.25rem;
  }
  .machine-card{
    background:#141414;
    border-radius:10px;
    padding:1.1rem 1.25rem;
    cursor:pointer;
    border:0.5px solid #262626;
    transition:border-color .15s;
  }
  .machine-card:hover{border-color:#4a4a4a; background:#181818;}
  .machine-card.selected{border-color:#8a8aff; box-shadow:0 0 0 1px #8a8aff inset;}
  .machine-card:active{transform:scale(0.99);}
  .machine-card p.label{font-size:13px; color:#9a9a9a; margin:0 0 10px;}
  .machine-card .status-row{display:flex; align-items:center; gap:8px; margin-bottom:8px;}
  .machine-card .status-text{font-size:15px; font-weight:600; color:#f0f0f0;}
  .machine-card .util-text{font-size:12px; color:#7a7a7a; margin:0;}
  .machine-card .hint{font-size:11px; color:#5a5a5a; margin:6px 0 0;}
  .gantt-panel{
    background:#141414;
    border:0.5px solid #262626;
    border-radius:10px;
    padding:1.25rem;
    margin-bottom:1.25rem;
    position:relative;
  }
  .gantt-row-label{font-size:13px; color:#9a9a9a; margin-bottom:4px;}
  .gantt-row{
    position:relative;
    height:36px;
    margin-bottom:10px;
    background:#232323;
    border-radius:5px;
  }
  .gantt-axis{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#7a7a7a;
    margin-top:6px;
  }
  #tooltip{
    position:absolute;
    display:none;
    background:#2a2a2a;
    border:1px solid #3d3d3d;
    border-radius:8px;
    padding:10px 12px;
    font-size:13px;
    line-height:1.5;
    color:#f0f0f0;
    pointer-events:none;
    z-index:5;
    white-space:nowrap;
  }
  .controls-row{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    background:#141414;
    border:0.5px solid #262626;
    border-radius:10px;
    padding:1rem 1.25rem;
    margin-bottom:1.25rem;
  }
  .transport-group{display:flex; align-items:center; gap:8px;}
  .icon-btn{
    width:42px; height:42px; padding:0;
    display:flex; align-items:center; justify-content:center;
    background:#1f1f1f; border:1px solid #454545; border-radius:9px;
    color:#f5f5f5; cursor:pointer;
    transition:background .15s, border-color .15s, transform .08s;
  }
  .icon-btn svg{width:18px; height:18px; display:block; fill:currentColor;}
  .icon-btn:hover{background:#2c2c2c; border-color:#5a5a5a;}
  .icon-btn:active{transform:scale(0.92);}
  .icon-btn:focus-visible{outline:2px solid #8a8aff; outline-offset:2px;}
  #play-btn{
    background:#e8e8e8; border-color:#e8e8e8; color:#111;
    width:48px; height:48px;
  }
  #play-btn svg{width:20px; height:20px;}
  #play-btn:hover{background:#ffffff; border-color:#ffffff;}
  .slider-wrap{flex:1; min-width:160px; display:flex; align-items:center; gap:10px;}
  .slider-time{font-size:12px; color:#9a9a9a; min-width:38px; text-align:right; font-variant-numeric:tabular-nums;}
  input[type="range"]{
    flex:1;
    -webkit-appearance:none;
    height:4px;
    background:#333;
    border-radius:2px;
    outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px; height:18px;
    border-radius:50%;
    background:#f0f0f0;
    cursor:pointer;
    border:none;
    box-shadow:0 0 0 3px rgba(240,240,240,0.15);
  }
  input[type="range"]::-moz-range-thumb{
    width:18px; height:18px;
    border-radius:50%;
    background:#f0f0f0;
    cursor:pointer;
    border:none;
    box-shadow:0 0 0 3px rgba(240,240,240,0.15);
  }
  .speed-group{display:flex; gap:6px; background:#1f1f1f; border:1px solid #3d3d3d; border-radius:9px; padding:3px;}
  .speed-btn{
    background:transparent; border:none; color:#9a9a9a; padding:7px 11px;
    font-size:12px; font-weight:600; border-radius:6px; cursor:pointer;
    transition:background .15s, color .15s;
  }
  .speed-btn:hover{color:#f0f0f0;}
  .speed-btn.active{background:#e8e8e8; color:#111;}
  .legend-row{
    display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    font-size:13px; color:#b0b0b0;
  }
  .legend-btn{
    display:flex; align-items:center; gap:0; background:#141414;
    border:1px solid #262626; border-radius:8px; padding:6px 12px 6px 10px;
    cursor:pointer; color:#b0b0b0; font-size:13px; transition:border-color .15s, opacity .15s;
  }
  .legend-btn:hover{border-color:#4a4a4a;}
  .legend-btn.dimmed{opacity:0.4;}
  .legend-swatch{
    display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:8px;
  }
  .legend-hint{margin-left:auto; color:#6a6a6a; font-size:12px;}
</style>
</head>
<body>
<div class="page">

  <div class="stat-grid">
    <div class="stat-card"><p class="label">Sim time</p><p class="value" id="stat-time">0.0</p></div>
    <div class="stat-card"><p class="label">Makespan</p><p class="value">154.1</p></div>

  <div id="machine-cards" class="machine-grid"></div>

  <div class="gantt-panel">

  </div>

  <div class="controls-row">

      </button>
      <button id="play-btn" class="icon-btn" aria-label="Play">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button id="step-fwd-btn" class="icon-btn" aria-label="Next event" title="Next event (across all machines)">
        <svg viewBox="0 0 24 24"><path d="M13 6v12l8.5-6zM11 6L2.5 12 11 18z" transform="scale(-1,1) translate(-24,0)"/></svg>
      </button>
      <button id="skip-end-btn" class="icon-btn" aria-label="Jump to end" title="Jump to end">
        <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 6l11 6-11 6z"/></svg>
      </button>
      <button id="restart-btn" class="icon-btn" aria-label="Restart" title="Restart from 0">
        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
    </div>
    <div class="slider-wrap">
      <span class="slider-time" id="slider-time-label">0.0</span>
      <input type="range" id="time-slider" min="0" max="154.1" value="0" step="0.1">
      <span class="slider-time">154.1</span>
    </div>
    <div class="speed-group" id="speed-group">
      <button class="speed-btn" data-speed="0.5">0.5x</button>
      <button class="speed-btn active" data-speed="1">1x</button>
      <button class="speed-btn" data-speed="2">2x</button>
      <button class="speed-btn" data-speed="4">4x</button>
    </div>
  </div>

  <div class="legend-row">
    <button class="legend-btn" data-type="0"><span class="legend-swatch" style="background:#7F77DD;"></span>Job type A</button>
    <button class="legend-btn" data-type="1"><span class="legend-swatch" style="background:#1D9E75;"></span>Job type B</button>
    <button class="legend-btn" data-type="2"><span class="legend-swatch" style="background:#D85A30;"></span>Job type C</button>
    <span class="legend-hint">Click a job type to isolate it · click a machine card to jump to its next job · hover bars for details · space to play/pause · arrow keys to nudge time</span>
  </div>

</div>

const M = data.num_machines;
const gRows = document.getElementById("gantt-rows");

const tooltip = document.getElementById("tooltip");
const ganttWrap = tooltip.parentElement;

  const label = document.createElement("div");
  label.className = "gantt-row-label";

function updateAtTime(t) {
  document.getElementById("stat-time").textContent = t.toFixed(1);
  document.getElementById("slider-time-label").textContent = t.toFixed(1);
  let opsCompleted = 0;
  let totalBusy = 0;
  for (let m = 0; m < M; m++) {
    const segs = data.history.filter(e => e.m === m);
    const active = segs.find(e => e.s <= t && t < e.e);
    const busySoFar = segs.filter(e => e.e <= t).reduce((a, e) => a + (e.e - e.s), 0)
      + (active ? (t - active.s) : 0);
    totalBusy += busySoFar;
    opsCompleted += segs.filter(e => e.e <= t).length;
    const util = t > 0 ? Math.round((busySoFar / t) * 100) : 0;
    document.getElementById(`util-${m}`).textContent = util + "%";
    const dot = document.getElementById(`dot-${m}`);
    const status = document.getElementById(`status-${m}`);

      dot.style.background = typeColors[active.t];
      status.textContent = "Processing job " + typeNames[active.t];
    } else {
      dot.style.background = "#555";
      status.textContent = "Idle";

    const ph = document.querySelector(".playhead-" + m);
    ph.style.left = ((t / data.makespan) * 100) + "%";
  }
  document.getElementById("stat-ops").textContent = opsCompleted;
  const avgUtil = t > 0 ? Math.round((totalBusy / (M * t)) * 100) : 0;
  document.getElementById("stat-util").textContent = avgUtil + "%";
}

const slider = document.getElementById("time-slider");
const playBtn = document.getElementById("play-btn");
const restartBtn = document.getElementById("restart-btn");
const skipStartBtn = document.getElementById("skip-start-btn");
const skipEndBtn = document.getElementById("skip-end-btn");
const stepBackBtn = document.getElementById("step-back-btn");
const stepFwdBtn = document.getElementById("step-fwd-btn");
slider.addEventListener("input", () => updateAtTime(parseFloat(slider.value)));
updateAtTime(0);

function goTo(t) {
  const clamped = Math.max(0, Math.min(data.makespan, t));
  slider.value = clamped;
  updateAtTime(clamped);
}
skipStartBtn.addEventListener("click", () => { pausePlayback(); goTo(0); });
skipEndBtn.addEventListener("click", () => { pausePlayback(); goTo(data.makespan); });
stepBackBtn.addEventListener("click", () => {
  const t = parseFloat(slider.value);
  const boundaries = data.history.flatMap(e => [e.s, e.e]).filter(x => x < t - 0.001);
  if (boundaries.length) goTo(Math.max(...boundaries));
});
stepFwdBtn.addEventListener("click", () => {
  const t = parseFloat(slider.value);
  const boundaries = data.history.flatMap(e => [e.s, e.e]).filter(x => x > t + 0.001);
  if (boundaries.length) goTo(Math.min(...boundaries));
});

const PLAY_ICON = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
const PAUSE_ICON = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';

let playing = false;
let rafId = null;
let lastTs = null;
let speed = 1;
function step(ts) {
  if (!playing) return;
  if (lastTs === null) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;
  let v = parseFloat(slider.value) + dt * 12 * speed;
  if (v >= data.makespan) {
    v = data.makespan;
    playing = false;
    playBtn.innerHTML = PLAY_ICON;
  }
  slider.value = v;
  updateAtTime(v);
  if (playing) rafId = requestAnimationFrame(step);
}
function togglePlay() {
  playing = !playing;
  playBtn.innerHTML = playing ? PAUSE_ICON : PLAY_ICON;
  if (playing) {
    if (parseFloat(slider.value) >= data.makespan) { slider.value = 0; updateAtTime(0); }
    lastTs = null;
    rafId = requestAnimationFrame(step);
  } else if (rafId) {
    cancelAnimationFrame(rafId);
  }
}
function pausePlayback() {
  playing = false;
  if (rafId) cancelAnimationFrame(rafId);
  playBtn.innerHTML = PLAY_ICON;
}
playBtn.addEventListener("click", togglePlay);
restartBtn.addEventListener("click", () => { pausePlayback(); goTo(0); });

const speedButtons = document.querySelectorAll(".speed-btn");
speedButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    speed = parseFloat(btn.dataset.speed);
    speedButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

let activeTypeFilter = null;
const legendButtons = document.querySelectorAll(".legend-btn");
function applyTypeFilter() {
  legendButtons.forEach(btn => {
    const t = parseInt(btn.dataset.type);
    btn.classList.toggle("dimmed", activeTypeFilter !== null && activeTypeFilter !== t);
  });
  document.querySelectorAll(".gantt-row").forEach(row => {
    Array.from(row.children).forEach(seg => {
      if (!seg.dataset || seg.dataset.type === undefined) return;
      const t = parseInt(seg.dataset.type);
      seg.style.opacity = (activeTypeFilter === null || activeTypeFilter === t) ? "1" : "0.15";
    });
  });
}
legendButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    const t = parseInt(btn.dataset.type);
    activeTypeFilter = (activeTypeFilter === t) ? null : t;
    applyTypeFilter();
  });
});

document.addEventListener("keydown", (ev) => {
  if (ev.target.tagName === "SELECT" || ev.target.tagName === "INPUT") return;
  if (ev.code === "Space") { ev.preventDefault(); togglePlay(); }
  if (ev.code === "ArrowRight") { goTo(parseFloat(slider.value) + 1); }
  if (ev.code === "ArrowLeft") { goTo(parseFloat(slider.value) - 1); }
});
</script>
</body>
